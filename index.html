<body class="bg-[#f8fafc]">
    <!-- Contenedor principal de la App -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell, LabelList } = window.Recharts;

        const TITULOS_RANGOS = {
          vencido: "Vencidos",
          riesgo: "Riesgo Crítico",
          preventiva: "Alerta Preventiva",
          plazo: "Dentro de Plazo"
        };

        const COLORS = {
          vencido: '#dc2626', 
          riesgo: '#f59e0b',  
          preventiva: '#a855f7',
          plazo: '#10b981',   
          otros: '#6366f1'    
        };

        // Utilidades para manejar fechas del Excel (YYYY-MM-DD o DD/MM/YYYY)
        const parseDateStr = (dStr) => {
            if (!dStr || dStr === '-' || dStr.trim() === '') return null;
            let parts = dStr.includes('/') ? dStr.split('/') : dStr.split('-');
            if (parts.length !== 3) return null;
            if (parts[0].length === 4) return new Date(parts[0], parts[1]-1, parts[2]); // YYYY-MM-DD
            return new Date(parts[2], parts[1]-1, parts[0]); // DD/MM/YYYY
        };

        const formatDateStr = (dStr) => {
            let d = parseDateStr(dStr);
            if (!d) return dStr; 
            return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
        };

        const App = () => {
          const [data, setData] = useState([]);
          const [searchTerm, setSearchTerm] = useState('');
          const [filterEtiqueta, setFilterEtiqueta] = useState('Todos');
          const [filterEstado, setFilterEstado] = useState('Todos');
          
          const [filterDestinatario, setFilterDestinatario] = useState('Todos');
          const [filterRemitente, setFilterRemitente] = useState('Todos');
          const [filterTipo, setFilterTipo] = useState('Todos');
          const [filterTipoPlazo, setFilterTipoPlazo] = useState('Todos');

          const [filterFoco, setFilterFoco] = useState('Todos');

          // Estado para la fecha y hora de actualización dinámica
          const [lastUpdated, setLastUpdated] = useState(() => {
            try {
              const metaScript = document.getElementById('dashboard-meta');
              if (metaScript && metaScript.textContent.trim() !== '') {
                const meta = JSON.parse(metaScript.textContent);
                if (meta.lastUpdated) return new Date(meta.lastUpdated);
              }
            } catch (e) {}
            return new Date();
          });

          // Estado para el Corte Manual
          const [manualCorte, setManualCorte] = useState(() => {
            try {
              const metaScript = document.getElementById('dashboard-meta');
              if (metaScript && metaScript.textContent.trim() !== '') {
                const meta = JSON.parse(metaScript.textContent);
                if (meta.manualCorte) return meta.manualCorte;
              }
            } catch (e) {}
            
            const date = new Date();
            const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
            const horas = date.getHours();
            const minutos = date.getMinutes().toString().padStart(2, '0');
            const ampm = horas >= 12 ? 'P.M.' : 'A.M.';
            return `${date.getDate()} DE ${meses[date.getMonth()]} DEL ${date.getFullYear()} - ${horas.toString().padStart(2, '0')}:${minutos} ${ampm}`;
          });

          const isDeveloper = typeof window.IS_VIEWER === 'undefined' || !window.IS_VIEWER;

          // Carga Inicial Inteligente (Calcula si la data no trae días/etiquetas pre-calculadas)
          useEffect(() => {
            try {
              const dataScript = document.getElementById('dashboard-data');
              if (dataScript && dataScript.textContent.trim() !== '') {
                const loadedData = JSON.parse(dataScript.textContent);
                
                // Mapear y auto-calcular
                const processedData = loadedData.map(row => {
                    let isFijo = row.plazo && row.plazo !== '-' && row.plazo !== '';
                    let fechaEmision = parseDateStr(row.fecha);
                    let fechaPlazo = parseDateStr(row.plazo);
                    let now = new Date();
                    now.setHours(0,0,0,0);

                    // 1. Calcular Días Transcurridos
                    let diasTransNum = row.diasTranscurridos !== '' ? parseFloat(row.diasTranscurridos) : 
                                      (fechaEmision ? Math.floor((now - fechaEmision)/(1000*60*60*24)) : 0);

                    // 2. Calcular Días de Entrega (Fijo)
                    let diasEntregaNum = null;
                    if (isFijo) {
                        if (row.diasEntrega !== '' && row.diasEntrega !== '-') {
                            diasEntregaNum = parseFloat(row.diasEntrega);
                        } else if (fechaPlazo) {
                            diasEntregaNum = Math.floor((fechaPlazo - now)/(1000*60*60*24));
                        }
                    }

                    // 3. Asignar Etiqueta
                    let etiquetaFinal = row.etiqueta;
                    if (!etiquetaFinal || etiquetaFinal === '') {
                        if (isFijo) {
                            if (diasEntregaNum < 0) etiquetaFinal = 'Vencido';
                            else if (diasEntregaNum <= 2) etiquetaFinal = 'Riesgo crítico';
                            else if (diasEntregaNum <= 5) etiquetaFinal = 'Alerta preventiva';
                            else etiquetaFinal = 'Dentro de plazo';
                        } else {
                            if (diasTransNum > 30) etiquetaFinal = 'Vencido';
                            else if (diasTransNum >= 15) etiquetaFinal = 'Riesgo crítico';
                            else if (diasTransNum >= 6) etiquetaFinal = 'Alerta preventiva';
                            else etiquetaFinal = 'Dentro de plazo';
                        }
                    }

                    return {
                        ...row,
                        fecha: formatDateStr(row.fecha),
                        plazo: isFijo ? formatDateStr(row.plazo) : '-',
                        diasTranscurridos: isNaN(diasTransNum) ? 0 : diasTransNum,
                        diasEntrega: isNaN(diasEntregaNum) ? null : diasEntregaNum,
                        tipoLazo: isFijo ? 'Fijo' : 'Regular',
                        etiqueta: etiquetaFinal
                    };
                });
                setData(processedData);
              }
            } catch (e) {
                console.error("Error cargando data inicial", e);
            }
          }, []);

          const safeTrim = (val) => {
            return (val !== undefined && val !== null) ? String(val).trim() : '';
          };

          // Función centralizada para parsear el CSV (y Excel) e inyectar la lógica de cálculo
          const parseCSV = (text) => {
            const firstLineIdx = text.indexOf('\n');
            const firstLine = firstLineIdx > -1 ? text.substring(0, firstLineIdx) : text;
            const delimiter = firstLine.includes(';') ? ';' : ',';
            
            const results = [];
            let current = '';
            let row = [];
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
              const char = text[i];
              const nextChar = text[i+1];
              
              if (char === '"') {
                if (inQuotes && nextChar === '"') { current += '"'; i++; } 
                else { inQuotes = !inQuotes; }
              } else if (char === delimiter && !inQuotes) {
                row.push(current); current = '';
              } else if ((char === '\n' || char === '\r') && !inQuotes) {
                if (char === '\r' && nextChar === '\n') i++; 
                row.push(current);
                if (row.some(function(cell) { return cell.trim() !== ''; })) { results.push(row); }
                row = []; current = '';
              } else {
                current += char;
              }
            }
            if (current || row.length > 0) { row.push(current); results.push(row); }
            if (results.length < 2) return [];

            let headerRowIndex = 0;
            for (let i = 0; i < Math.min(10, results.length); i++) {
              if (results[i].some(function(cell) { return cell.toUpperCase().includes('NRO DE EMISI'); })) { 
                headerRowIndex = i; break; 
              }
            }
            
            const headers = results[headerRowIndex].map(function(h) { return h.trim().toUpperCase(); });
            
            const colIdx = {
              id: headers.findIndex(function(h) { return h.includes('NRO DE EMISI'); }),
              fecha: headers.findIndex(function(h) { return h.includes('FECHA EMISI'); }),
              remitente: headers.findIndex(function(h) { return h.includes('REMITENTE'); }),
              tipo: headers.findIndex(function(h) { return h.includes('TIPO DOCUMENTO'); }),
              nroDoc: headers.findIndex(function(h) { return h.includes('NRO DOCUMENTO'); }),
              destinatario: headers.findIndex(function(h) { return h.includes('DESTINA'); }),
              asunto: headers.findIndex(function(h) { return h.includes('ASUNTO'); }),
              expediente: headers.findIndex(function(h) { return h.includes('EXPEDIENTE'); }),
              estado: headers.findIndex(function(h) { return h.includes('ESTADO'); }),
              comentario: headers.findIndex(function(h) { return h.includes('COMENTARIO'); }),
              plazo: headers.findIndex(function(h) { return h === 'PLAZO' || h.includes('FECHA MAX'); }),
              diasTranscurridos: headers.findIndex(function(h) { return h.includes('DIAS TRANSCURRIDOS') || h === 'DIAS' || h === 'DÍAS'; }),
              diasEntrega: headers.findIndex(function(h) { return h.includes('DIAS PARA ENTREGA'); }),
              etiqueta: headers.findIndex(function(h) { return h.includes('ETIQUETA'); }),
            };

            let now = new Date();
            now.setHours(0,0,0,0);

            return results.slice(headerRowIndex + 1).map(function(r) {
              const idVal = colIdx.id > -1 ? r[colIdx.id] : r[0];
              if (!idVal || safeTrim(idVal) === '') return null;
              
              const rawDiasTrans = safeTrim(colIdx.diasTranscurridos > -1 ? r[colIdx.diasTranscurridos] : '');
              const rawDiasEntrega = safeTrim(colIdx.diasEntrega > -1 ? r[colIdx.diasEntrega] : '');
              const rawEtiqueta = safeTrim(colIdx.etiqueta > -1 ? r[colIdx.etiqueta] : '');
              const rawPlazo = safeTrim(colIdx.plazo > -1 ? r[colIdx.plazo] : '');
              const rawFecha = safeTrim(colIdx.fecha > -1 ? r[colIdx.fecha] : r[1]);
              
              let fechaEmision = parseDateStr(rawFecha);
              let fechaPlazo = parseDateStr(rawPlazo);
              
              let isFijo = rawPlazo && rawPlazo !== '-' && rawPlazo !== '';
              
              // CÁLCULO DE DÍAS TRANSCURRIDOS
              let diasTransNum = 0;
              if (rawDiasTrans !== '') {
                  diasTransNum = parseFloat(rawDiasTrans);
              } else if (fechaEmision) {
                  diasTransNum = Math.floor((now - fechaEmision)/(1000*60*60*24));
              }

              // CÁLCULO DE DÍAS DE ENTREGA (Solo Plazo Fijo)
              let diasEntregaNum = null;
              if (isFijo) {
                  if (rawDiasEntrega !== '' && rawDiasEntrega !== '-') {
                      diasEntregaNum = parseFloat(rawDiasEntrega);
                  } else if (fechaPlazo) {
                      diasEntregaNum = Math.floor((fechaPlazo - now)/(1000*60*60*24));
                  }
              }

              // CÁLCULO DE ETIQUETA AUTOMÁTICA
              let etiquetaFinal = rawEtiqueta;
              if (!etiquetaFinal || etiquetaFinal === '') {
                  if (isFijo) {
                      if (diasEntregaNum < 0) etiquetaFinal = 'Vencido';
                      else if (diasEntregaNum <= 2) etiquetaFinal = 'Riesgo crítico';
                      else if (diasEntregaNum <= 5) etiquetaFinal = 'Alerta preventiva';
                      else etiquetaFinal = 'Dentro de plazo';
                  } else {
                      if (diasTransNum > 30) etiquetaFinal = 'Vencido';
                      else if (diasTransNum >= 15) etiquetaFinal = 'Riesgo crítico';
                      else if (diasTransNum >= 6) etiquetaFinal = 'Alerta preventiva';
                      else etiquetaFinal = 'Dentro de plazo';
                  }
              }

              return {
                id: safeTrim(idVal),
                fecha: formatDateStr(rawFecha),
                remitente: safeTrim(colIdx.remitente > -1 ? r[colIdx.remitente] : r[2]),
                tipo: safeTrim(colIdx.tipo > -1 ? r[colIdx.tipo] : r[3]),
                nroDoc: safeTrim(colIdx.nroDoc > -1 ? r[colIdx.nroDoc] : r[4]),
                destinatario: safeTrim(colIdx.destinatario > -1 ? r[colIdx.destinatario] : r[5]),
                asunto: safeTrim(colIdx.asunto > -1 ? r[colIdx.asunto] : r[6]).replace(/\n/g, ' ').replace(/\r/g, ''),
                expediente: safeTrim(colIdx.expediente > -1 ? r[colIdx.expediente] : r[7]),
                estado: safeTrim(colIdx.estado > -1 ? r[colIdx.estado] : r[8]),
                comentario: safeTrim(colIdx.comentario > -1 ? r[colIdx.comentario] : ''),
                plazo: isFijo ? formatDateStr(rawPlazo) : '-',
                diasTranscurridos: isNaN(diasTransNum) ? 0 : diasTransNum,
                diasEntrega: isNaN(diasEntregaNum) ? null : diasEntregaNum,
                tipoLazo: isFijo ? 'Fijo' : 'Regular',
                etiqueta: etiquetaFinal
              };
            }).filter(Boolean);
          };

          const procesarDatosGenerales = (text) => {
            const newData = parseCSV(text);
            if (newData.length > 0) {
              setData(newData);
              const now = new Date();
              setLastUpdated(now); 
              const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
              const horas = now.getHours();
              const minutos = now.getMinutes().toString().padStart(2, '0');
              const ampm = horas >= 12 ? 'P.M.' : 'A.M.';
              setManualCorte(`${now.getDate()} DE ${meses[now.getMonth()]} DEL ${now.getFullYear()} - ${horas.toString().padStart(2, '0')}:${minutos} ${ampm}`);
            }
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (file) {
              const extension = file.name.split('.').pop().toLowerCase();
              const reader = new FileReader();
              
              if (extension === 'csv') {
                reader.onload = (event) => procesarDatosGenerales(event.target.result);
                reader.readAsText(file);
              } else if (extension === 'xlsx' || extension === 'xls') {
                reader.onload = (event) => {
                  const data = new Uint8Array(event.target.result);
                  const workbook = window.XLSX.read(data, {type: 'array'});
                  const firstSheetName = workbook.SheetNames[0];
                  const worksheet = workbook.Sheets[firstSheetName];
                  const csvText = window.XLSX.utils.sheet_to_csv(worksheet);
                  procesarDatosGenerales(csvText);
                };
                reader.readAsArrayBuffer(file);
              } else {
                alert("Formato no válido. Por favor, carga un archivo CSV o Excel.");
              }
            }
          };

          const exportarDashboard = () => {
            const exportDate = new Date();
            const dataString = JSON.stringify(data);
            const documentClone = document.cloneNode(true);
            
            const dataScript = documentClone.getElementById('dashboard-data');
            if(dataScript) dataScript.textContent = dataString;

            let metaScript = documentClone.getElementById('dashboard-meta');
            if(metaScript) metaScript.textContent = JSON.stringify({ 
                lastUpdated: exportDate.toISOString(),
                manualCorte: manualCorte 
            });

            // Inyectamos la variable que le dice a la copia descargada que active el modo visor (ocultando los botones)
            const viewerScript = documentClone.createElement('script');
            viewerScript.textContent = 'window.IS_VIEWER = true;';
            documentClone.head.appendChild(viewerScript);

            // Limpiamos el contenedor renderizado
            const rootDiv = documentClone.getElementById('root');
            if(rootDiv) rootDiv.innerHTML = '';

            const htmlContent = "<!DOCTYPE html>\n" + documentClone.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Dashboard_Publico_OPPMI.html';
            a.click();
            setLastUpdated(exportDate);
          };

          const stats = useMemo(() => ({
            total: data.length,
            vencidos: data.filter(d => (d.etiqueta || '').toLowerCase().includes('vencido')).length,
            riesgo: data.filter(d => (d.etiqueta || '').toLowerCase().includes('riesgo')).length,
            preventiva: data.filter(d => (d.etiqueta || '').toLowerCase().includes('preventiva')).length,
            enPlazo: data.filter(d => (d.etiqueta || '').toLowerCase().includes('plazo')).length,
          }), [data]);

          const getPercentage = (val, tot) => tot === 0 ? '0%' : Math.round((val / tot) * 100) + '%';

          const chartData = useMemo(() => {
            const counts = {};
            data.forEach(d => {
              const key = d.etiqueta || 'Otros';
              counts[key] = (counts[key] || 0) + 1;
            });
            return Object.keys(counts).map(key => ({ name: key, value: counts[key] }));
          }, [data]);

          // --- LÓGICA: FOCO CRÍTICO GLOBAL (Fijo + Regular) ---
          const focoCriticoData = useMemo(() => {
            return data
              .filter(d => {
                const tag = (d.etiqueta || '').toLowerCase();
                return tag.includes('vencido') || tag.includes('riesgo');
              })
              .sort((a, b) => {
                const aVencido = (a.etiqueta || '').toLowerCase().includes('vencido') ? -1 : 1;
                const bVencido = (b.etiqueta || '').toLowerCase().includes('vencido') ? -1 : 1;
                if (aVencido !== bVencido) return aVencido - bVencido;
                
                const valA = a.tipoLazo === 'Fijo' ? a.diasEntrega : -a.diasTranscurridos;
                const valB = b.tipoLazo === 'Fijo' ? b.diasEntrega : -b.diasTranscurridos;
                return valA - valB;
              });
          }, [data]);

          const focoCriticoStats = useMemo(() => ({
            total: focoCriticoData.length,
            vencidos: focoCriticoData.filter(d => (d.etiqueta || '').toLowerCase().includes('vencido')).length,
            riesgo: focoCriticoData.filter(d => (d.etiqueta || '').toLowerCase().includes('riesgo')).length,
          }), [focoCriticoData]);

          const focoCriticoTarjetas = useMemo(() => {
            return focoCriticoData.filter(d => {
              if (filterFoco === 'Todos') return true;
              if (filterFoco === 'Vencido' && (d.etiqueta || '').toLowerCase().includes('vencido')) return true;
              if (filterFoco === 'Riesgo crítico' && (d.etiqueta || '').toLowerCase().includes('riesgo')) return true;
              return false;
            });
          }, [focoCriticoData, filterFoco]);

          const barData = useMemo(() => {
            const destCounts = {};
            data.forEach(function(d) {
              const parts = (d.destinatario || '').trim().split(/\s+/) || [];
              let shortName = d.destinatario || "Sin Asignar";
              if (parts.length >= 3) {
                shortName = `${parts[2]} ${parts[0]}`; 
              } else if (parts.length === 2) {
                shortName = `${parts[1]} ${parts[0]}`; 
              }
              destCounts[shortName] = (destCounts[shortName] || 0) + 1;
            });
            return Object.keys(destCounts)
              .map(function(name) { return { name: name, documentos: destCounts[name] }; })
              .sort(function(a, b) { return b.documentos - a.documentos; });
          }, [data]);

          const getRemProcessed = (remRaw) => {
            if (!remRaw) return '';
            return remRaw.includes('-') ? remRaw.split('-').slice(1).join('-').trim() : remRaw.trim();
          };

          const checkFilters = (item, skipField) => {
            const searchStr = searchTerm.toLowerCase();
            const matchesSearch = (item.id || '').toLowerCase().includes(searchStr) || (item.asunto || '').toLowerCase().includes(searchStr);
            const mEtiqueta = skipField === 'etiqueta' || filterEtiqueta === 'Todos' || item.etiqueta === filterEtiqueta;
            const mEstado = skipField === 'estado' || filterEstado === 'Todos' || (item.estado || '').toUpperCase() === filterEstado;
            const mDestinatario = skipField === 'destinatario' || filterDestinatario === 'Todos' || (item.destinatario || '').trim() === filterDestinatario;
            const mRemitente = skipField === 'remitente' || filterRemitente === 'Todos' || getRemProcessed(item.remitente) === filterRemitente;
            const mTipo = skipField === 'tipo' || filterTipo === 'Todos' || (item.tipo || '').trim() === filterTipo;
            const mTipoPlazo = skipField === 'tipoPlazo' || filterTipoPlazo === 'Todos' || (filterTipoPlazo === 'Fijo' && item.tipoLazo === 'Fijo') || (filterTipoPlazo === 'Regular' && item.tipoLazo === 'Regular');
            return matchesSearch && mEtiqueta && mEstado && mDestinatario && mRemitente && mTipo && mTipoPlazo;
          };

          const listDestinatarios = useMemo(() => {
            const set = new Set();
            data.forEach(item => { if (checkFilters(item, 'destinatario') && item.destinatario) set.add(item.destinatario.trim()); });
            return Array.from(set).sort();
          }, [data, searchTerm, filterEtiqueta, filterEstado, filterRemitente, filterTipo, filterTipoPlazo]);

          const listRemitentes = useMemo(() => {
            const set = new Set();
            data.forEach(item => { if (checkFilters(item, 'remitente') && item.remitente) set.add(getRemProcessed(item.remitente)); });
            return Array.from(set).sort();
          }, [data, searchTerm, filterEtiqueta, filterEstado, filterDestinatario, filterTipo, filterTipoPlazo]);

          const listTipos = useMemo(() => {
            const set = new Set();
            data.forEach(item => { if (checkFilters(item, 'tipo') && item.tipo) set.add(item.tipo.trim()); });
            return Array.from(set).sort();
          }, [data, searchTerm, filterEtiqueta, filterEstado, filterDestinatario, filterRemitente, filterTipoPlazo]);

          const listEstados = useMemo(() => {
            const set = new Set();
            data.forEach(item => { if (checkFilters(item, 'estado') && item.estado) set.add(item.estado.toUpperCase()); });
            return Array.from(set).sort();
          }, [data, searchTerm, filterEtiqueta, filterDestinatario, filterRemitente, filterTipo, filterTipoPlazo]);

          const listTipoPlazos = useMemo(() => {
            const set = new Set();
            data.forEach(item => { if (checkFilters(item, 'tipoPlazo') && item.tipoLazo) set.add(item.tipoLazo); });
            return Array.from(set).sort();
          }, [data, searchTerm, filterEtiqueta, filterEstado, filterDestinatario, filterRemitente, filterTipo]);

          const listEtiquetas = useMemo(() => {
            const set = new Set();
            data.forEach(item => { if (checkFilters(item, 'etiqueta') && item.etiqueta) set.add(item.etiqueta); });
            return Array.from(set).sort();
          }, [data, searchTerm, filterEstado, filterDestinatario, filterRemitente, filterTipo, filterTipoPlazo]);

          const filteredData = data.filter(item => checkFilters(item, 'none'));

          return (
            <div className="min-h-screen bg-[#f8fafc] p-4 md:p-8 font-sans text-slate-900 relative">
              
              {/* === ENCABEZADO DESTACADO CON FONDO COLORIDO === */}
              <header className="bg-gradient-to-r from-blue-50 via-indigo-50 to-indigo-100 rounded-[2rem] p-6 md:p-8 shadow-lg shadow-indigo-200/50 border border-indigo-200 mb-10 relative overflow-hidden flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6 z-20">
                
                {/* --- MARCA DE AGUA BOSQUE INTEGRADA AL ENCABEZADO --- */}
                <div className="absolute right-0 bottom-0 w-[80%] md:w-[60%] xl:w-[50%] h-[120%] pointer-events-none z-0 opacity-70 mix-blend-multiply flex justify-end items-end overflow-hidden" 
                     style={{ maskImage: 'linear-gradient(to right, transparent 0%, black 50%)', WebkitMaskImage: 'linear-gradient(to right, transparent 0%, black 50%)' }}>
                    <img src="image_e7f6d1.png" alt="Bosque" className="h-full w-full object-cover object-bottom" onError={(e) => e.target.style.display = 'none'} />
                </div>

                <div className="flex flex-col sm:flex-row items-start sm:items-center gap-6 relative z-10 w-full xl:w-auto">
                  {/* Tarjeta blanca protectora para el Logo MINAM */}
                  <div className="bg-white p-2.5 rounded-2xl shadow-sm border border-white shrink-0">
                      <img src="LOGO MINAM_1.jpg" alt="Logo MINAM" className="h-12 sm:h-14 object-contain" 
                           onError={(e) => { e.target.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Ministerio_del_Ambiente_-_Per%C3%BA.svg/512px-Ministerio_del_Ambiente_-_Per%C3%BA.svg.png'; }} />
                  </div>
                  
                  <div className="hidden sm:block h-16 w-0.5 bg-indigo-200 rounded-full"></div>
                  
                  <div className="flex-1 w-full">
                    <h1 className="text-2xl sm:text-3xl font-black text-indigo-950 tracking-tight">SEGUIMIENTO DOCUMENTAL - OPPMI</h1>
                    
                    {/* CAMPO DE CORTE EDITABLE */}
                    <div className="flex flex-wrap items-center gap-3 mt-3">
                      <div className={`flex items-center gap-2 p-1.5 rounded-xl border w-full sm:w-auto transition-colors ${isDeveloper ? 'bg-white/70 border-indigo-300 focus-within:bg-white focus-within:border-indigo-400 shadow-sm' : 'bg-transparent border-transparent'}`}>
                        <span className="text-[10px] font-black text-indigo-800 bg-indigo-200/80 px-2 py-1 rounded uppercase tracking-wider shrink-0">
                          CORTE:
                        </span>
                        {isDeveloper ? (
                          <>
                            <input 
                              type="text" 
                              className="text-xs sm:text-sm font-bold text-indigo-900 bg-transparent border-none focus:ring-0 focus:outline-none w-full sm:w-[260px] placeholder:text-indigo-400/70"
                              value={manualCorte}
                              onChange={(e) => setManualCorte(e.target.value)}
                              placeholder="Ej. 17 de abril del 2026 - 12:00 P.M."
                            />
                            <i className="fa-solid fa-pen text-indigo-400 text-[10px] mr-2" title="Puedes editar este texto"></i>
                          </>
                        ) : (
                          <span className="text-xs sm:text-sm font-bold text-indigo-900 px-1 w-full sm:w-[260px]">
                            {manualCorte}
                          </span>
                        )}
                      </div>
                      
                      <div className="flex items-center gap-2 text-[11px] font-bold text-indigo-700 bg-white/60 px-3 py-2 rounded-xl border border-indigo-100 shadow-sm shrink-0">
                        <i className="fa-solid fa-database text-indigo-500"></i> {data.length} documentos cargados
                      </div>
                    </div>
                  </div>
                </div>
                
                {/* BOTONES ADMINISTRATIVOS: Solo visibles antes de exportar */}
                {isDeveloper && (
                  <div className="flex flex-col sm:flex-row gap-4 w-full xl:w-auto relative z-10">
                      <label className="flex-1 flex items-center gap-4 bg-white/90 backdrop-blur-md px-6 py-4 border-2 border-dashed border-indigo-300 rounded-[2rem] cursor-pointer hover:border-indigo-500 hover:bg-white transition-all shadow-sm group">
                        <i className="fa-solid fa-file-excel text-indigo-400 text-2xl group-hover:text-indigo-600 transition-all"></i>
                        <div className="text-left"><span className="block text-sm font-black text-indigo-950">1. Cargar Datos</span><span className="block text-[10px] text-indigo-500 font-bold uppercase">CSV o Excel (.xlsx)</span></div>
                        <input type="file" className="hidden" accept=".csv, .xlsx, .xls" onChange={handleFileUpload} />
                      </label>
                      <button onClick={exportarDashboard} className="flex-1 flex items-center gap-4 bg-indigo-600 backdrop-blur-md px-6 py-4 border-2 border-indigo-600 rounded-[2rem] hover:bg-indigo-700 hover:scale-105 transition-all shadow-lg shadow-indigo-300 group">
                        <i className="fa-solid fa-download text-white text-2xl group-hover:-translate-y-1 transition-transform"></i>
                        <div className="text-left"><span className="block text-sm font-black text-white">2. Exportar Archivo</span><span className="block text-[10px] text-indigo-200 font-bold uppercase">Descargar para Compartir</span></div>
                      </button>
                  </div>
                )}
              </header>

              {/* === BULLETS SUPERIORES ESTADÍSTICOS === */}
              <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 mb-4">
                <StatCard title="Total Pendientes" value={stats.total} percentage="100%" iconClass="fa-solid fa-file-lines" color="text-indigo-600" bg="bg-indigo-50" />
                <StatCard title={TITULOS_RANGOS.vencido} value={stats.vencidos} percentage={getPercentage(stats.vencidos, stats.total)} iconClass="fa-solid fa-triangle-exclamation" color="text-red-700" bg="bg-red-100" />
                <StatCard title={TITULOS_RANGOS.riesgo} value={stats.riesgo} percentage={getPercentage(stats.riesgo, stats.total)} iconClass="fa-solid fa-clock" color="text-amber-600" bg="bg-amber-50" />
                <StatCard title={TITULOS_RANGOS.preventiva} value={stats.preventiva} percentage={getPercentage(stats.preventiva, stats.total)} iconClass="fa-solid fa-bell" color="text-purple-600" bg="bg-purple-50" />
                <StatCard title={TITULOS_RANGOS.plazo} value={stats.enPlazo} percentage={getPercentage(stats.enPlazo, stats.total)} iconClass="fa-solid fa-circle-check" color="text-emerald-600" bg="bg-emerald-50" />
              </div>

              {/* --- LEYENDA DE CRITERIOS DE ALERTA --- */}
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-10 flex flex-col xl:flex-row items-center justify-center gap-4 xl:gap-8">
                  <div className="flex items-center gap-2 text-slate-500 font-black text-[10px] uppercase tracking-widest shrink-0">
                      <i className="fa-solid fa-circle-info text-indigo-400 text-lg"></i>
                      Criterios de Alerta
                  </div>
                  <div className="flex flex-col md:flex-row flex-wrap items-center justify-center gap-4 text-[10px] font-bold text-slate-600 w-full xl:w-auto">
                      <div className="flex flex-wrap items-center justify-center gap-3 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 w-full md:w-auto">
                          <span className="bg-slate-200 text-slate-600 px-2 py-1 rounded uppercase tracking-wider font-black text-[9px] mr-1">Trámite Regular:</span>
                          <span className="flex items-center gap-1.5 whitespace-nowrap"><div className="w-2 h-2 rounded-full bg-emerald-500 shadow-sm"></div> 0 a 5 días</span>
                          <span className="flex items-center gap-1.5 whitespace-nowrap"><div className="w-2 h-2 rounded-full bg-purple-500 shadow-sm"></div> 6 a 14 días</span>
                          <span className="flex items-center gap-1.5 whitespace-nowrap"><div className="w-2 h-2 rounded-full bg-amber-500 shadow-sm"></div> 15 a 29 días</span>
                          <span className="flex items-center gap-1.5 whitespace-nowrap"><div className="w-2 h-2 rounded-full bg-red-600 shadow-sm"></div> > 30 días (Vencido)</span>
                      </div>
                      <div className="flex items-center justify-center gap-3 bg-indigo-50/50 px-4 py-2 rounded-xl border border-indigo-50/80 w-full md:w-auto">
                          <span className="bg-indigo-100 text-indigo-700 px-2 py-1 rounded uppercase tracking-wider font-black text-[9px]">Plazo Fijo:</span> 
                          <span className="text-slate-500 italic">Se rige estrictamente acorde a la fecha de vencimiento del documento.</span>
                      </div>
                  </div>
              </div>

              {/* --- BANNER DE INSIGHT: FOCO CRÍTICO GLOBAL --- */}
              {focoCriticoData.length > 0 && (
                <div className="bg-gradient-to-br from-indigo-700 via-indigo-600 to-blue-700 rounded-[2.5rem] shadow-2xl shadow-indigo-600/30 mb-10 overflow-hidden flex flex-col lg:flex-row relative border border-indigo-500/50">
                  <div className="absolute top-0 right-0 -mt-10 -mr-10 w-64 h-64 bg-white rounded-full blur-[80px] opacity-10 pointer-events-none"></div>
                  <div className="absolute bottom-0 left-0 -mb-10 -ml-10 w-64 h-64 bg-cyan-400 rounded-full blur-[80px] opacity-20 pointer-events-none"></div>
                  
                  {/* PANEL IZQUIERDO REDUCIDO EN ANCHO PARA MAYOR PROPORCIÓN */}
                  <div className="p-6 lg:p-8 lg:w-[280px] xl:w-[320px] shrink-0 border-b lg:border-b-0 lg:border-r border-indigo-500/50 relative z-10 flex flex-col justify-between">
                      
                      <div>
                        <div className="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 px-3 py-2 rounded-full mb-6 shadow-xl w-fit">
                          <div className="relative flex h-2.5 w-2.5 shrink-0">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                            <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,1)]"></span>
                          </div>
                          <h2 className="text-white font-black uppercase tracking-[0.15em] text-[10px]">Foco Crítico</h2>
                        </div>
                        
                        <div className="flex items-center gap-4 mb-8 text-white">
                          <div className="text-5xl font-black tracking-tighter leading-none">{focoCriticoStats.total}</div>
                          <div className="flex flex-col justify-center">
                            <span className="text-sm font-black opacity-100 leading-tight tracking-wide">Documentos</span>
                            <span className="text-sm font-black opacity-100 leading-tight tracking-wide">Prioritarios</span>
                          </div>
                        </div>

                        {/* --- TOTALES VIBRANTES CON SÍMBOLO DE ALERTA SEGURO --- */}
